<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  max-width: 300px;
}

.step {
  display: none;
  animation: fade 1s;
}

.step.active {
  display: block;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  font-size: 16px;
}

@keyframes fade {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="container">

  <div class="step active">
    <h2>Halo sayang ❤️</h2>
    <p>Coba klik next ya 😊</p>
    <button onclick="nextStep()">Next</button>
  </div>

  <div class="step">
    <h2>Aku cuma mau bilang...</h2>
    <button onclick="nextStep()">Next</button>
  </div>

  <div class="step">
    <h2>aku kangen kamu</h2>
    <p>kapan kita ngentot?</p>
  </div>

</div>

<script>
let current = 0;
const steps = document.querySelectorAll(".step");

function nextStep() {
  steps[current].classList.remove("active");
  current++;
  if (current < steps.length) {
    steps[current].classList.add("active");
  }
}
</script>

</body>
</html>
